type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        name: Dziś
        icon: mdi:calendar-today
        layout: icon_name
        entity: input_select.statystyki_czas
        show_state: false
        show_name: true
        show_icon: true
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.statystyki_czas
            option: Dziś
        styles:
          card:
            - flex: 1
            - margin: 10px 4px 0px 0px
            - border-radius: 25px
            - padding: 14px 20px
            - font-family: >-
